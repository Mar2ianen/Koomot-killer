name: kk_flutter_ui_mvp
description: Minimal Material 3 UI prototype for Komoot Killer GPX route viewer.
publish_to: "none"
version: 0.1.5+6

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.3
  file_picker: ^8.1.7
  flutter_map: ^7.0.2
  flutter_rust_bridge: 2.11.1
  latlong2: ^0.9.1
  xml: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/samples/
